# PostgreSQL for local development (matches appsettings.Development.json defaults)
services:
  postgres:
    image: postgres:16
    container_name: fireops-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fireops_crm_dev
    ports:
      - "5432:5432"
    volumes:
      - fireops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fireops_crm_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fireops_pgdata:
